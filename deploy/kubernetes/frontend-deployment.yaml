apiVersion: apps/v1
kind: Deployment
metadata:
  name: cyph-frontend
  labels:
    app: cyph-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cyph-frontend
  template:
    metadata:
      labels:
        app: cyph-frontend
    spec:
      containers:
        - name: frontend
          image: cyph-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: cyph-frontend
spec:
  selector:
    app: cyph-frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
