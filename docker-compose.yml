# Cyph – local dev with persistent DB and live code updates.
# One command: docker compose up
# App: http://localhost:4200  Backend: http://localhost:8080  DB: postgres (internal)
# Keycloak (local SSO): http://localhost:8180  Admin: admin / admin
#
# Live reload: frontend uses ng serve --poll 2000; backend polls src/ every 2s and recompiles/restarts.
# After changing Dockerfile.dev or entrypoint scripts, run: docker compose up --build

services:
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: start --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      # Use host.docker.internal so the issuer in the discovery document matches the backend's issuer-uri (backend uses host.docker.internal to reach Keycloak).
      KC_HOSTNAME: host.docker.internal
      KC_HOSTNAME_PORT: 8180
      KC_HTTP_ENABLED: "true"
    ports:
      - "8180:8080"
    volumes:
      - ./config/keycloak/cyph-realm.json:/opt/keycloak/data/import/cyph-realm.json

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cyph
      POSTGRES_USER: cyph
      POSTGRES_PASSWORD: cyph
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyph"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/cyph
      SPRING_DATASOURCE_USERNAME: cyph
      SPRING_DATASOURCE_PASSWORD: cyph
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_H2_CONSOLE_ENABLED: "false"
      CYPH_SITE_URL: http://localhost:4200
      # Super-admin: created/updated in DB on startup from these env vars (production: use secret manager).
      ADMIN_USERNAME: admin@localhost
      ADMIN_PASSWORD: admin
      SERVER_SERVLET_SESSION_COOKIE_DOMAIN: localhost
      SERVER_SERVLET_SESSION_COOKIE_PATH: /
      # Keycloak (local SSO only). Backend uses host.docker.internal so browser and backend both reach Keycloak at localhost:8180.
      CYPH_AUTH_OAUTH2_REGISTRATION_IDS_0: keycloak
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_CLIENT_ID: cyph-backend
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_CLIENT_SECRET: cyph-backend-secret
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_SCOPE: openid,email,profile
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_ISSUER_URI: http://host.docker.internal:8180/realms/cyph
    volumes:
      - ./backend:/app
      - backend_gradle:/app/.gradle
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "4200:4200"
    environment:
      CYPH_API_TARGET: http://backend:8080
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
  backend_gradle:
  frontend_node_modules:
