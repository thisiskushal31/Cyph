<div class="flex min-h-screen flex-col">
  <!-- Nav: island at top (centered, original length); full-width bar when scrolled -->
  <header
    class="sticky top-0 z-30 w-full transition-[padding] duration-250 ease-out"
    [class.px-4]="!isScrolled"
    [class.pt-3]="!isScrolled"
    [class.pb-1.5]="!isScrolled"
    [class.md:pt-4]="!isScrolled"
    [class.md:pb-2]="!isScrolled"
    [class.px-0]="isScrolled"
    [class.pt-0]="isScrolled"
    [class.pb-0]="isScrolled"
  >
    <div
      class="flex w-full transition-all duration-250 ease-out"
      [class.mx-auto]="!isScrolled"
      [class.max-w-4xl]="!isScrolled"
      [class.justify-center]="!isScrolled"
    >
      <div
        class="flex w-full items-center justify-between gap-2 px-4 py-2 backdrop-blur-sm transition-[border-radius] duration-250 ease-out md:gap-3 md:px-6 md:py-2"
        [class.nav-island]="!isScrolled"
        [class.nav-bar]="isScrolled"
        [class.rounded-2xl]="!isScrolled"
        [class.max-w-4xl]="!isScrolled"
      >
        <a routerLink="/send" class="text-base font-bold tracking-tight text-white md:text-lg">Cyph</a>

        <!-- Desktop: nav links in center, Sign in right -->
        <nav class="hidden flex-1 items-center justify-center gap-0.5 md:flex">
          <a routerLink="/send" routerLinkActive="bg-indigo-600/20 text-indigo-300 font-semibold" [routerLinkActiveOptions]="{ exact: false }" class="rounded-lg px-3 py-1.5 text-sm font-medium text-slate-300 hover:bg-slate-800 hover:text-white">Send</a>
          <a routerLink="/admin" routerLinkActive="bg-indigo-600/20 text-indigo-300 font-semibold" class="rounded-lg px-3 py-1.5 text-sm font-medium text-slate-300 hover:bg-slate-800 hover:text-white">Admin</a>
          <a routerLink="/log" routerLinkActive="bg-indigo-600/20 text-indigo-300 font-semibold" class="rounded-lg px-3 py-1.5 text-sm font-medium text-slate-300 hover:bg-slate-800 hover:text-white">Log</a>
        </nav>

        <!-- Desktop: Sign in right -->
        <div class="hidden items-center gap-2 md:flex">
          <a routerLink="/login" class="rounded-lg px-3 py-1.5 text-sm font-semibold text-indigo-400 hover:bg-slate-800 hover:text-indigo-300">Sign in</a>
        </div>

        <!-- Mobile: hamburger only (links in overlay) -->
        <button
          type="button"
          class="flex md:hidden h-9 w-9 shrink-0 items-center justify-center rounded-lg text-slate-300 hover:bg-slate-800 hover:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:ring-offset-2 focus:ring-offset-slate-900"
          (click)="navOpen = !navOpen"
          [attr.aria-expanded]="navOpen"
          aria-label="Open menu"
        >
          <span class="flex flex-col gap-1.5" aria-hidden="true">
            <span class="block h-0.5 w-5 rounded-full bg-current transition-all duration-200" [class.rotate-45]="navOpen" [class.translate-y-2]="navOpen"></span>
            <span class="block h-0.5 w-5 rounded-full bg-current transition-opacity duration-200" [class.opacity-0]="navOpen"></span>
            <span class="block h-0.5 w-5 rounded-full bg-current transition-all duration-200" [class.-rotate-45]="navOpen" [class.-translate-y-2]="navOpen"></span>
          </span>
        </button>
      </div>
    </div>
  </header>

  <!-- Mobile: centered floating island menu (not edge drawer) -->
  <div
    class="fixed inset-0 z-40 flex items-center justify-center p-4 md:hidden transition-[visibility] duration-300"
    [class.invisible]="!navOpen"
    [class.pointer-events-none]="!navOpen"
    role="dialog"
    aria-modal="true"
    aria-label="Menu"
    [attr.aria-hidden]="!navOpen"
  >
    <!-- Backdrop: blurred -->
    <button
      type="button"
      class="absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity duration-300"
      [class.opacity-0]="!navOpen"
      [class.opacity-100]="navOpen"
      aria-label="Close menu"
      (click)="navOpen = false"
    ></button>
    <!-- Island panel: centered, rounded -->
    <aside
      class="nav-island relative w-full max-w-[320px] flex flex-col rounded-2xl transition-[transform,opacity] duration-300"
      [class.scale-95]="!navOpen"
      [class.opacity-0]="!navOpen"
      [class.scale-100]="navOpen"
      [class.opacity-100]="navOpen"
      (click)="$event.stopPropagation()"
    >
      <!-- Header: Cyph + X -->
      <div class="flex items-center justify-between border-b border-slate-700/80 px-5 py-4">
        <span class="text-lg font-bold tracking-tight text-white">Cyph</span>
        <button
          type="button"
          class="flex h-10 w-10 items-center justify-center rounded-xl text-slate-300 hover:bg-slate-800 hover:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500"
          aria-label="Close menu"
          (click)="navOpen = false"
        >
          <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
      <!-- Nav links -->
      <nav class="flex flex-col py-2">
        <a routerLink="/send" routerLinkActive="bg-slate-800 text-white" [routerLinkActiveOptions]="{ exact: false }" class="block px-5 py-4 text-base font-medium text-slate-200 hover:bg-slate-800/80 hover:text-white" (click)="navOpen = false">Send</a>
        <a routerLink="/admin" routerLinkActive="bg-slate-800 text-white" class="block px-5 py-4 text-base font-medium text-slate-200 hover:bg-slate-800/80 hover:text-white" (click)="navOpen = false">Admin</a>
        <a routerLink="/log" routerLinkActive="bg-slate-800 text-white" class="block px-5 py-4 text-base font-medium text-slate-200 hover:bg-slate-800/80 hover:text-white" (click)="navOpen = false">Log</a>
      </nav>
      <!-- Divider + CTA -->
      <div class="border-t border-slate-700/80 p-4">
        <a routerLink="/login" class="app-btn-primary block w-full py-3.5 text-center text-base" (click)="navOpen = false">Sign in</a>
      </div>
    </aside>
  </div>

  <main class="app-main">
    <router-outlet></router-outlet>
  </main>
</div>
