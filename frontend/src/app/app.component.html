<div class="min-h-screen bg-slate-50">
  <header class="border-b border-slate-200 bg-white">
    <div class="flex w-full items-center justify-between px-4 py-3 sm:px-6 lg:px-8">
      <a routerLink="/send" class="text-xl font-semibold text-slate-900">Cyph</a>
      <nav class="flex items-center gap-4">
        <a routerLink="/send" routerLinkActive="font-medium" [routerLinkActiveOptions]="{ exact: false }" class="text-slate-600 hover:text-slate-900">Send</a>
        <a routerLink="/admin" routerLinkActive="font-medium" class="text-slate-600 hover:text-slate-900">Admin</a>
        <a routerLink="/log" routerLinkActive="font-medium" class="text-slate-600 hover:text-slate-900">Log</a>
        <a routerLink="/login" class="rounded-md bg-indigo-600 px-3 py-1.5 text-sm font-medium text-white hover:bg-indigo-500">Sign in</a>
      </nav>
    </div>
  </header>
  <main>
    <router-outlet></router-outlet>
  </main>
</div>
